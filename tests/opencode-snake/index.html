<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>现代贪吃蛇</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --food-color: #f43f5e;
            --grid-color: rgba(255, 255, 255, 0.05);
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: none; /* 防止移动端滚动 */
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
        }
        .score-board {
            display: flex;
            justify-content: space-between;
            width: 100%;
            background: var(--panel-bg);
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }
        .score-box {
            font-size: 16px;
            font-weight: bold;
        }
        .score-box span {
            color: var(--accent-color);
        }
        .canvas-wrapper {
            position: relative;
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            background-color: #0f172a;
            border-radius: 8px;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            z-index: 10;
        }
        .overlay.hidden {
            display: none;
        }
        .overlay h2 {
            margin: 0 0 10px 0;
            font-size: 32px;
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
        .overlay p {
            margin: 0 0 20px 0;
            color: #94a3b8;
        }
        .btn {
            background: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }
        .btn:active {
            transform: scale(0.95);
        }
        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
        }
        .secondary-btn {
            background: var(--panel-bg);
            color: var(--text-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
        }
        .secondary-btn:active {
            background: rgba(255,255,255,0.1);
        }
        .d-pad {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .d-row {
            display: flex;
            gap: 50px;
        }
        .d-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--panel-bg);
            border: 2px solid rgba(255,255,255,0.1);
            color: var(--text-color);
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .d-btn:active {
            background: rgba(255,255,255,0.2);
            transform: scale(0.9);
        }
        @media (min-width: 768px) {
            .d-pad {
                display: none; /* 桌面端隐藏方向键 */
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="score-board">
            <div class="score-box">分数: <span id="score">0</span></div>
            <div class="score-box">最高分: <span id="high-score">0</span></div>
            <div class="score-box">速度: <span id="speed">1</span></div>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="game-canvas"></canvas>
            <div id="overlay" class="overlay">
                <h2 id="overlay-title">贪吃蛇</h2>
                <p id="overlay-desc">按方向键或使用屏幕按钮开始</p>
                <button id="start-btn" class="btn">开始游戏</button>
            </div>
        </div>
        
        <div class="controls">
            <button id="btn-pause" class="secondary-btn">暂停/继续</button>
            <button id="btn-restart" class="secondary-btn">重新开始</button>
        </div>
        
        <div class="d-pad">
            <button class="d-btn up" id="btn-up">&#9650;</button>
            <div class="d-row">
                <button class="d-btn left" id="btn-left">&#9664;</button>
                <button class="d-btn down" id="btn-down">&#9660;</button>
                <button class="d-btn right" id="btn-right">&#9654;</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');
        const speedEl = document.getElementById('speed');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('btn-pause');
        const restartBtn = document.getElementById('btn-restart');

        // 游戏网格设置
        const gridSize = 20;
        let tileCount = 20;
        let tileSize = 20;

        // 游戏状态
        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = 0;
        let dy = 0;
        let nextDx = 0;
        let nextDy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let speed = 1;
        let baseSpeedMs = 150;
        let currentSpeedMs = baseSpeedMs;
        let gameLoopTimeout;
        let isPaused = false;
        let isGameOver = false;
        let isPlaying = false;
        let foodPulse = 0;

        highScoreEl.textContent = highScore;

        // 响应式画布大小
        function resizeCanvas() {
            const containerWidth = document.querySelector('.canvas-wrapper').clientWidth - 20;
            const size = Math.min(containerWidth, 400);
            // 确保画布大小是网格的整数倍
            const adjustedSize = Math.floor(size / gridSize) * gridSize;
            canvas.width = adjustedSize;
            canvas.height = adjustedSize;
            tileSize = adjustedSize / gridSize;
            tileCount = gridSize;
            if (isPlaying && !isPaused) {
                draw();
            } else if (!isPlaying && !isGameOver) {
                drawBackground();
            }
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function initGame() {
            snake = [
                { x: Math.floor(tileCount / 2), y: Math.floor(tileCount / 2) },
                { x: Math.floor(tileCount / 2), y: Math.floor(tileCount / 2) + 1 },
                { x: Math.floor(tileCount / 2), y: Math.floor(tileCount / 2) + 2 }
            ];
            dx = 0;
            dy = -1;
            nextDx = 0;
            nextDy = -1;
            score = 0;
            speed = 1;
            currentSpeedMs = baseSpeedMs;
            scoreEl.textContent = score;
            speedEl.textContent = speed;
            isGameOver = false;
            isPaused = false;
            isPlaying = true;
            overlay.classList.add('hidden');
            spawnFood();
            clearTimeout(gameLoopTimeout);
            gameLoop();
        }

        function spawnFood() {
            let valid = false;
            while (!valid) {
                food.x = Math.floor(Math.random() * tileCount);
                food.y = Math.floor(Math.random() * tileCount);
                valid = true;
                for (let segment of snake) {
                    if (segment.x === food.x && segment.y === food.y) {
                        valid = false;
                        break;
                    }
                }
            }
        }

        function gameLoop() {
            if (isPaused || isGameOver || !isPlaying) return;
            
            update();
            
            gameLoopTimeout = setTimeout(gameLoop, currentSpeedMs);
        }

        function update() {
            dx = nextDx;
            dy = nextDy;
            
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            // 撞墙检测
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            // 撞自己检测
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                
                // 增加速度
                if (score % 50 === 0) {
                    speed++;
                    speedEl.textContent = speed;
                    currentSpeedMs = Math.max(50, baseSpeedMs - (speed - 1) * 15);
                }
                
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function drawBackground() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * tileSize, 0);
                ctx.lineTo(i * tileSize, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * tileSize);
                ctx.lineTo(canvas.width, i * tileSize);
                ctx.stroke();
            }
        }

        function draw() {
            drawBackground();
            
            if (!isPlaying && !isGameOver) return;

            // 绘制食物（带脉冲动画）
            foodPulse += 0.1;
            const pulseScale = 1 + Math.sin(foodPulse) * 0.15;
            const foodRadius = (tileSize / 2) * 0.7 * pulseScale;
            const foodCx = food.x * tileSize + tileSize / 2;
            const foodCy = food.y * tileSize + tileSize / 2;
            
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#f43f5e';
            ctx.fillStyle = '#f43f5e';
            ctx.beginPath();
            ctx.arc(foodCx, foodCy, foodRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // 绘制蛇
            for (let i = 0; i < snake.length; i++) {
                const segment = snake[i];
                const isHead = i === 0;
                
                // 渐变颜色 (青色到蓝色)
                const ratio = i / snake.length;
                const r = Math.floor(56 * (1 - ratio) + 59 * ratio);
                const g = Math.floor(189 * (1 - ratio) + 130 * ratio);
                const b = Math.floor(248 * (1 - ratio) + 246 * ratio);
                
                ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                
                if (isHead) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = `rgb(${r}, ${g}, ${b})`;
                } else {
                    ctx.shadowBlur = 0;
                }
                
                // 绘制圆角矩形
                const x = segment.x * tileSize + 1;
                const y = segment.y * tileSize + 1;
                const size = tileSize - 2;
                const radius = isHead ? size / 3 : size / 4;
                
                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.lineTo(x + size - radius, y);
                ctx.quadraticCurveTo(x + size, y, x + size, y + radius);
                ctx.lineTo(x + size, y + size - radius);
                ctx.quadraticCurveTo(x + size, y + size, x + size - radius, y + size);
                ctx.lineTo(x + radius, y + size);
                ctx.quadraticCurveTo(x, y + size, x, y + size - radius);
                ctx.lineTo(x, y + radius);
                ctx.quadraticCurveTo(x, y, x + radius, y);
                ctx.closePath();
                ctx.fill();
                
                // 绘制眼睛
                if (isHead) {
                    ctx.fillStyle = '#0f172a';
                    ctx.shadowBlur = 0;
                    const eyeRadius = size / 8;
                    let eye1x, eye1y, eye2x, eye2y;
                    
                    if (dx === 1) { // 右
                        eye1x = x + size * 0.7; eye1y = y + size * 0.3;
                        eye2x = x + size * 0.7; eye2y = y + size * 0.7;
                    } else if (dx === -1) { // 左
                        eye1x = x + size * 0.3; eye1y = y + size * 0.3;
                        eye2x = x + size * 0.3; eye2y = y + size * 0.7;
                    } else if (dy === 1) { // 下
                        eye1x = x + size * 0.3; eye1y = y + size * 0.7;
                        eye2x = x + size * 0.7; eye2y = y + size * 0.7;
                    } else { // 上
                        eye1x = x + size * 0.3; eye1y = y + size * 0.3;
                        eye2x = x + size * 0.7; eye2y = y + size * 0.3;
                    }
                    
                    ctx.beginPath(); ctx.arc(eye1x, eye1y, eyeRadius, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(eye2x, eye2y, eyeRadius, 0, Math.PI * 2); ctx.fill();
                }
            }
            ctx.shadowBlur = 0;
        }

        // 动画循环 (用于食物脉冲动画)
        function animationLoop() {
            if (isPlaying && !isGameOver) {
                draw();
            }
            requestAnimationFrame(animationLoop);
        }
        requestAnimationFrame(animationLoop);

        function gameOver() {
            isGameOver = true;
            isPlaying = false;
            overlayTitle.textContent = '游戏结束';
            overlayTitle.style.color = '#f43f5e';
            overlayTitle.style.textShadow = '0 0 10px rgba(244, 63, 94, 0.5)';
            overlayDesc.textContent = `最终得分: ${score}`;
            startBtn.textContent = '重新开始';
            overlay.classList.remove('hidden');
        }

        function togglePause() {
            if (isGameOver || !isPlaying) return;
            isPaused = !isPaused;
            if (isPaused) {
                overlayTitle.textContent = '已暂停';
                overlayTitle.style.color = '#38bdf8';
                overlayTitle.style.textShadow = '0 0 10px rgba(56, 189, 248, 0.5)';
                overlayDesc.textContent = '休息一下';
                startBtn.textContent = '继续游戏';
                overlay.classList.remove('hidden');
            } else {
                overlay.classList.add('hidden');
                gameLoop();
            }
        }

        // 输入处理
        function handleInput(newDx, newDy) {
            if (isPaused || isGameOver || !isPlaying) return;
            // 防止反向移动
            if (newDx !== 0 && dx === -newDx) return;
            if (newDy !== 0 && dy === -newDy) return;
            
            nextDx = newDx;
            nextDy = newDy;
        }

        window.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    handleInput(0, -1);
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    handleInput(0, 1);
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    handleInput(-1, 0);
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    handleInput(1, 0);
                    e.preventDefault();
                    break;
                case ' ':
                case 'Escape':
                    togglePause();
                    e.preventDefault();
                    break;
            }
        });

        // 按钮事件
        startBtn.addEventListener('click', () => {
            if (isGameOver || !isPlaying) {
                initGame();
            } else if (isPaused) {
                togglePause();
            }
        });

        pauseBtn.addEventListener('click', togglePause);

        restartBtn.addEventListener('click', () => {
            initGame();
        });

        // 移动端方向键事件
        const bindDpad = (id, dx, dy) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(dx, dy); });
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); handleInput(dx, dy); });
        };

        bindDpad('btn-up', 0, -1);
        bindDpad('btn-down', 0, 1);
        bindDpad('btn-left', -1, 0);
        bindDpad('btn-right', 1, 0);

        // 初始绘制背景
        drawBackground();
    </script>
</body>
</html>
